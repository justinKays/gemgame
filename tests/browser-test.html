<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gem Duel Rule Tests</title>
    <style>
      :root {
        color: #1d2027;
        background: #f7f5ef;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 2rem;
        letter-spacing: 0;
      }

      #summary {
        margin: 0 0 16px;
        font-weight: 800;
      }

      ol {
        display: grid;
        gap: 8px;
        margin: 0;
        padding-left: 22px;
      }

      li {
        padding: 10px 12px;
        border: 1px solid #d8d5ca;
        border-radius: 8px;
        background: #fff;
      }

      .pass {
        border-color: rgba(29, 143, 90, 0.35);
      }

      .fail {
        border-color: rgba(192, 75, 115, 0.5);
        background: #fff5f7;
      }
    </style>
  </head>
  <body>
    <h1>Gem Duel Rule Tests</h1>
    <p id="summary">Running...</p>
    <ol id="results"></ol>

    <script src="../src/game.js"></script>
    <script>
      (function runBrowserRuleTests() {
        "use strict";

        var Game = window.GemGame;
        var results = [];

        function assert(condition, message) {
          if (!condition) {
            throw new Error(message);
          }
        }

        function deepEqual(a, b) {
          return JSON.stringify(a) === JSON.stringify(b);
        }

        function playPair(state, p1Gem, p2Gem) {
          Game.selectGem(state, "p1", p1Gem);
          Game.selectGem(state, "p2", p2Gem);
          return Game.resolveRound(state);
        }

        function test(name, fn) {
          try {
            fn();
            results.push({ name: name, ok: true });
          } catch (error) {
            results.push({ name: name, ok: false, error: error.message });
          }
        }

        function evenRounds() {
          return [
            { a: 1, b: 2, c: 1, d: 2 },
            { a: 2, b: 1, c: 1, d: 1 },
            { a: 1, b: 2, c: 3, d: 1 },
            { a: 3, b: 2, c: 2, d: 3 },
            { a: 4, b: 3, c: 4, d: 3 },
            { a: 4, b: 5, c: 3, d: 4 },
            { a: 5, b: 4, c: 7, d: 5 },
            { a: 5, b: 6, c: 4, d: 6 }
          ];
        }

        function assertThrows(fn, expectedText) {
          var threw = false;
          try {
            fn();
          } catch (error) {
            threw = error.message.indexOf(expectedText) !== -1;
          }
          assert(threw, "Expected error containing " + expectedText);
        }

        test("targets stay in the correct pools", function targetsStayInPools() {
          for (var i = 0; i < 50; i += 1) {
            var state = Game.createGame({ seed: "target-test-" + i });
            assert(Game.TARGET_POOLS.p1.indexOf(state.targets.p1) !== -1, "P1 target outside pool");
            assert(Game.TARGET_POOLS.p2.indexOf(state.targets.p2) !== -1, "P2 target outside pool");
          }
        });

        test("generated schedules are fair and every gem appears each round", function schedulesAreFair() {
          var expectedRoundTotals = Game.ROUND_PROFILES.map(function sumProfile(profile) {
            return profile.reduce(function sum(total, count) {
              return total + count;
            }, 0);
          });
          var expectedRoundSpreads = Game.ROUND_PROFILES.map(function spreadProfile(profile) {
            return Math.max.apply(null, profile) - Math.min.apply(null, profile);
          });

          for (var i = 0; i < 50; i += 1) {
            var state = Game.createGame({ seed: "schedule-test-" + i });
            var validation = Game.validateSchedule(state.rounds);
            var roundTotals = state.rounds.map(function roundTotal(round) {
              return Game.GEMS.reduce(function sum(total, gemId) {
                return total + round[gemId];
              }, 0);
            });
            var roundSpreads = state.rounds.map(function roundSpread(round) {
              var counts = Game.GEMS.map(function countGem(gemId) {
                return round[gemId];
              });
              return Math.max.apply(null, counts) - Math.min.apply(null, counts);
            });
            assert(state.rounds.length === Game.ROUND_COUNT, "wrong round count");
            assert(validation.valid, "invalid schedule");
            assert(deepEqual(roundTotals, expectedRoundTotals), "round totals do not increase correctly");
            assert(deepEqual(roundSpreads, expectedRoundSpreads), "round spreads do not become more extreme");
            assert(Math.max.apply(null, roundSpreads.slice(0, 4)) <= 2, "early rounds are too uneven");
            assert(Math.min.apply(null, roundSpreads.slice(5)) >= 5, "late rounds are not uneven enough");
            Game.GEMS.forEach(function checkTotal(gemId) {
              assert(validation.totals[gemId] === Game.COPIES_PER_GEM, "unfair total for " + gemId);
            });
            state.rounds.forEach(function checkRound(round) {
              Game.GEMS.forEach(function checkGem(gemId) {
                assert(round[gemId] >= Game.MIN_PER_GEM_PER_ROUND, "missing " + gemId + " in a round");
                assert(round[gemId] <= Game.MAX_PER_GEM_PER_ROUND, "too many " + gemId + " in a round");
              });
            });
            Game.GEMS.forEach(function checkLateGame(gemId) {
              var earlyTotal = state.rounds.slice(0, 4).reduce(function sum(total, round) {
                return total + round[gemId];
              }, 0);
              var lateTotal = state.rounds.slice(4).reduce(function sum(total, round) {
                return total + round[gemId];
              }, 0);
              assert(lateTotal > earlyTotal, "late game is not larger for " + gemId);
            });
          }
        });

        test("same choices collide", function sameChoicesCollide() {
          var state = Game.createGame({ seed: "collision", rounds: evenRounds() });
          var result = playPair(state, "a", "a");
          assert(result.collision, "collision was not detected");
          assert(deepEqual(result.gains, { p1: null, p2: null }), "collision gains are wrong");
          assert(deepEqual(result.gainCounts, { p1: 0, p2: 0 }), "collision gain counts are wrong");
          assert(state.collected.p1.a === 0 && state.collected.p2.a === 0, "collision awarded gems");
        });

        test("different choices award gems", function differentChoicesAwardGems() {
          var state = Game.createGame({ seed: "collect", rounds: evenRounds() });
          var result = playPair(state, "b", "d");
          assert(!result.collision, "different choices collided");
          assert(deepEqual(result.gains, { p1: "b", p2: "d" }), "gains are wrong");
          assert(deepEqual(result.gainCounts, { p1: 2, p2: 2 }), "gain counts are wrong");
          assert(state.collected.p1.b === 2 && state.collected.p2.d === 2, "gems were not awarded");
        });

        test("winner uses target gem counts", function winnerUsesTargetCounts() {
          var state = Game.createGame({ seed: "winner", rounds: evenRounds() });
          state.targets = { p1: "a", p2: "c" };
          for (var round = 0; round < Game.ROUND_COUNT; round += 1) {
            playPair(state, "a", round === 0 ? "c" : "d");
            if (round < Game.ROUND_COUNT - 1) {
              Game.advanceRound(state);
            }
          }
          assert(state.phase === "complete", "match did not complete");
          assert(Game.getTargetScore(state, "p1") === 25, "P1 target score is wrong");
          assert(Game.getTargetScore(state, "p2") === 1, "P2 target score is wrong");
          assert(Game.getWinner(state) === "p1", "winner is wrong");
        });

        test("invalid and duplicate choices are rejected", function invalidChoicesReject() {
          var state = Game.createGame({ seed: "invalid", rounds: evenRounds() });
          assertThrows(function chooseBadPlayer() {
            Game.selectGem(state, "p3", "a");
          }, "Unknown player");
          assertThrows(function chooseBadGem() {
            Game.selectGem(state, "p1", "z");
          }, "Unknown gem");
          Game.selectGem(state, "p1", "a");
          assertThrows(function chooseAgain() {
            Game.selectGem(state, "p1", "b");
          }, "already locked");
        });

        var summary = document.getElementById("summary");
        var list = document.getElementById("results");
        var failed = results.filter(function failedOnly(result) {
          return !result.ok;
        });

        summary.textContent = failed.length === 0
          ? results.length + " tests passed."
          : failed.length + " of " + results.length + " tests failed.";
        list.innerHTML = results.map(function renderResult(result) {
          return '<li class="' + (result.ok ? "pass" : "fail") + '">' +
            (result.ok ? "PASS " : "FAIL ") +
            result.name +
            (result.error ? ": " + result.error : "") +
            "</li>";
        }).join("");
      })();
    </script>
  </body>
</html>
